# nginx 설정 파일 (Docker 환경 — /etc/nginx/nginx.conf)
# Express API 서버와 연동하여 클라이언트 + API 서빙

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    client_max_body_size 100m;

    # ========================================
    # gzip 압축
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # ========================================
    # 요청 제한 설정
    # ========================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=400r/m;
    limit_req_zone $binary_remote_addr zone=login:10m   rate=30r/m;

    # rate limit 초과 시 503 대신 올바른 429 반환
    limit_req_status 429;

    # ========================================
    # CORS Origin 안전 처리
    # $http_origin 이 비어있으면 Access-Control-Allow-Origin: (빈 값) 이 반환되어
    # CORS 스펙 위반이 되므로, Origin 헤더가 있을 때만 값을 사용한다.
    # 브라우저 요청은 항상 Origin 을 포함하므로 실제 CORS 요청은 모두 정상 처리된다.
    # 서버-서버 호출 등 Origin 없는 요청은 빈 문자열 → nginx 가 헤더 자체를 생략한다.
    # ========================================
    map $http_origin $cors_origin {
        default  '';
        ~^https?://.+  $http_origin;
    }

    # 메인 서버 블록
    server {
        listen       80;
        server_name  localhost;

        # ========================================
        # IP 제한 설정
        # ========================================
        allow 192.168.0.0/16;
        #allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        # ========================================
        # CORS 에러 응답 처리
        # rate limit 등으로 nginx가 직접 에러를 반환할 때
        # Express가 붙이는 CORS 헤더가 없으므로 여기서 추가
        # ========================================
        error_page 429 @cors_429;
        location @cors_429 {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Vary'                             'Origin'     always;
            return 429 '{"success":false,"message":"요청이 너무 많습니다. 잠시 후 다시 시도해주세요."}';
        }

        error_page 503 @cors_503;
        location @cors_503 {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Vary'                             'Origin'     always;
            return 503 '{"success":false,"message":"서버가 일시적으로 과부하 상태입니다. 잠시 후 다시 시도해주세요."}';
        }

        # ========================================
        # 업로드 파일 처리
        # ========================================

        # 이미지/아바타: 브라우저 인라인 표시 허용
        location ~ ^/uploads/(images|avatars)/ {
            alias /app/server/uploads/$1/;
            expires 1y;
            add_header Cache-Control        "public, immutable";
            add_header Content-Disposition  "inline";
            add_header X-Content-Type-Options "nosniff";
        }

        # 일반 파일: 다운로드 강제
        location /uploads/ {
            alias /app/server/uploads/;
            expires 1y;
            add_header Cache-Control          "public, immutable";
            add_header Content-Disposition    "attachment";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Download-Options     "noopen";
            try_files $uri =404;
        }

        # ========================================
        # 로그인 API — 엄격한 rate limit
        # ========================================
        location = /api/auth/login {
            # OPTIONS preflight: rate limit 없이 Express 로 전달
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=login burst=3 nodelay;

            proxy_pass http://app:4000/api/auth/login;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 토큰 갱신 API — 별도 처리 (rate limit 완화)
        # ========================================
        location = /api/auth/refresh {
            # OPTIONS preflight: rate limit 없이 처리
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            # 토큰 갱신은 일반 API 보다 넉넉하게 (burst=10 정도로 충분)
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://app:4000/api/auth/refresh;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 관리자 API
        # ========================================
        location /api/admin/ {
            # OPTIONS preflight
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=api burst=15 nodelay;

            proxy_pass http://app:4000/api/admin/;
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 일반 API 프록시
        # ========================================
        location /api/ {
            # OPTIONS preflight: rate limit 없이 처리
            # rate limit에 걸린 429 응답에는 CORS 헤더가 없어서
            # 브라우저가 CORS 에러로 잘못 해석하는 것을 방지
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           '600'  always;
                add_header 'Vary'                             'Origin' always;
                return 204;
            }

            limit_req zone=api burst=30 nodelay;

            proxy_pass http://app:4000/api/;

            # Origin 헤더 명시적 전달 — hostname 접근, Vite proxy 등 다양한 환경 대응
            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 클라이언트 정적 파일 (폰트/CSS/JS 캐싱)
        # ========================================
        location ~* ^(?!/uploads/).*\.(css|js|woff|woff2|ttf|eot)$ {
            root   /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # ========================================
        # React SPA
        # ========================================
        location / {
            limit_req zone=general burst=20 nodelay;
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # ========================================
        # 에러 페이지
        # ========================================
        error_page 500 501 502 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 400 401 402 403 404 /index.html;

    } # server 블록 종료
} # http 블록 종료
