version: '3.8'

services:
  # ========================================
  # MariaDB 데이터베이스
  # ========================================
  mariadb:
    image: mariadb:11
    container_name: myhome-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${DB_NAME:-myhome}
      MYSQL_USER: ${DB_USER:-myhome}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - myhome-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # 마이홈 애플리케이션
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myhome-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    # 서버 시작 전 빌드된 클라이언트 파일을 공유 볼륨에 복사 (매 시작마다 갱신)
    command: sh -c "cp -r /app/client/dist/. /app/static/ && exec node server/dist/index.js"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_USER: ${DB_USER:-myhome}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-myhome}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-ChangeMe_2024!}
    volumes:
      - uploads_data:/app/server/uploads
      - logs_data:/app/logs
      # 클라이언트 정적 파일을 nginx와 공유하는 볼륨 (빌드 이미지 재생성 후에도 자동 갱신)
      - static_data:/app/static
    ports:
      - "4000:4000"
    networks:
      - myhome-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ========================================
  # Nginx 리버스 프록시 (선택사항)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: myhome-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # app 컨테이너가 시작 시 복사한 최신 정적 파일을 서빙
      - static_data:/usr/share/nginx/html:ro
      - uploads_data:/app/server/uploads:ro
    networks:
      - myhome-network

# ========================================
# 볼륨 정의
# ========================================
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  # app 컨테이너가 매 시작 시 /app/client/dist를 복사 → Nginx가 읽는 공유 볼륨
  static_data:
    driver: local

# ========================================
# 네트워크 정의
# ========================================
networks:
  myhome-network:
    driver: bridge
